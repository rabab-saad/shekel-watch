[supervisord]
nodaemon=true
logfile=/dev/null
logfile_maxbytes=0

[program:node]
command=node /app/dist/server.js
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
environment=NODE_ENV=production

[program:streamlit]
command=/app/venv/bin/streamlit run /app/python/app.py --server.port=8501 --server.address=0.0.0.0 --server.baseUrlPath=/streamlit --server.headless=true
directory=/app/python
autostart=true
autorestart=true
stdout_logfile=/dev/fd/1
stdout_logfile_maxbytes=0
stderr_logfile=/dev/fd/2
stderr_logfile_maxbytes=0
