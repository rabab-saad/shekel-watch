[build]
builder = "nixpacks"
buildCommand = "pip install -r apps/streamlit-frontend/requirements.txt"

[deploy]
startCommand = "streamlit run apps/streamlit-frontend/app.py --server.port $PORT --server.headless true"
healthcheckPath = "/_stcore/health"
healthcheckTimeout = 60
restartPolicyType = "ON_FAILURE"
restartPolicyMaxRetries = 3
